  content: Tesla has launched a new program that will allow Powerwall owners to kick
    power back to the grid in times of high usage. The "Tesla Virtual Power Plant"
    is now entering a beta phase, letting customer… [+1623 chars]
  page_url: "/tesla-powerwall-owners-can-now-help-balance-the-grid-in-california-052917432.html"
  summary: When it first announced the program last week, Tesla noted that "the California
    grid operator forecasts a continued need for Californians to support the grid
    through 2021." "If Powerwall fully charges before an event, your solar system
    will resume powering your home and export any excess power to the grid. However,
    customers already on net metering programs will be compensated for any power sent
    back to the grid as usual, Electrek noted. Tesla has launched a new program that
    will allow Powerwall owners to kick power back to the grid in times of high usage.
    Tesla gave an example showing that the app will give you a push notification warning
    a few hours ahead of any grid stress events. "Tesla noted that customers will
    not be compensated for contributing to the Virtual Power Plant, though it encouraged
    users to join up for what it called a "public good." The "Tesla Virtual Power
    Plant" is now entering a beta phase, letting customers sign up, albeit without
    any compensation for the time being.
