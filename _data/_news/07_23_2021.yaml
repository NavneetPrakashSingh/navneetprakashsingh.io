  content: OnePlus has an unusual problem. Its making very good flagship smartphones
    these days the OnePlus 9 Pro is an incredibly good phone but at the same time,
    its still chasing its status as flagship phone… [+6169 chars]
  page_url: "/oneplus-nord-2-5-g-impressions-release-date-price-144511154.html"
  summary: While its OnePlus highest specification front sensor, capable of taking
    32-megapixel pictures, its just a single camera sensor, compared to the dual-array
    on the original Nord. The rear module is now three cameras, not four, with a primary
    50-megapixel (up from 48MP) sensor with optical image stabilization (OIS) responsible
    for the heavy lifting. Video in low light suffered from a weird pulsing effect,
    that might be due to electronic image stabilization. It uses electronic image
    stabilization to amp up how much wobble it can handle, and video was pleasantly
    smooth  if the lighting was good enough. Its called the MediaTek Dimensity 1200-AI,
    which, unsurprisingly, offers a degree of AI-centric muscle to processes like
    photo manipulation and the aforementioned video playback boosts. Ive been testing
    the Nord 2 for a couple of days, and if you liked the proposition of the original
    Nord, youll probably like its sequel. While it might look the part, is it as good?I
    loved the vivid eye-catching sky blue of last years Nord, but its successor has
    a more restrained palette.
