  title: Framework’s modular laptop is uncontroversial on purpose | Engadget
  description: How much would you pay for a laptop you could theoretically keep running
    for longer than a decade?.
  url: https://www.engadget.com/framework-laptop-review-150001399.html
  urlToImage: https://s.yimg.com/os/creatr-uploaded-images/2021-07/e1867930-e93f-11eb-8de5-0d0581187a5b
  publishedAt: '2021-07-22T15:07:21.2907796Z'
  content: Framework is a laptop designed, from the get-go, to be modular and repairable
    by every one of its users. Created by Nirav Patel, formerly of Oculus, the machine
    aims to demonstrate that there is a be… [+12562 chars]
  page_url: "/framework-laptop-review-150001399.html"
  summary: We need to be able to judge this thing on its merits and, in that regard,
    its a pretty good laptop, certainly at this price and with this performance. Five
    screws are all that connect the top of the laptops deck, containing the fingerprint
    sensor, keyboard and trackpad, to the rest of the base. Imagine, for instance,
    when a very famous laptop maker decided to use a different keyboard technology
    for its most popular machines. Naturally, a good keyboard is key, especially given
    how much time people will be spending on this thing each day. Once lifted off,
    I had to unplug one clearly labeled ribbon cable, pop the replacement keyboard
    back on and screw everything back together. Framework is a laptop designed, from
    the get-go, to be modular and repairable by every one of its users. In the standard
    setup, youll get a quartet of USB-C cards  and youll need at least one for charging  but
    there are a number of others available.
