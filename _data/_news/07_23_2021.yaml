    about the game's third and final mode under wrap… [+2636 chars]
  page_url: "/battlefield-2042-portal-mode-customs-180008313.html"
  summary: All of the maps, including the classic ones, will support matches of up
    to 128 players on PC, Xbox Series consoles and PlayStation 5. The mode features
    pre-programmed, reimagined experiences from these past titles, including conquest,
    rush and team deathmatch. In Builder, players can design their own matches and
    share them with the community, adjusting a range of settings including the game
    logic itself. Players won't be able to edit any of the actual maps, but overall,
    Portal has an extremely rich customization mode. Battlefield Portal also supports
    classic soldier archetypes like Battlefield 3's assault, recon, support and engineer
    roles.All of this culminates in the Builder tool in Battlefield Portal. As with
    Battlefield 2042's main All-Out Warfare mode, matches on older-gen hardware will
    be capped at 64 players.Here's where it gets custom. There's still one more game
    mode yet to be revealed, Hazard Zone.
