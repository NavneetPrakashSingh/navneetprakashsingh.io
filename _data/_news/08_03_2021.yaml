    TPG, which it first announced back in February. Under their agreement, TPG would
    own 30 percent of the spinoff, while the mobile giant will retain a 70 percent
    ownership. As its own company, DirecTV will no longer operate under AT&amp;amp;T
    and will own and run the AT&amp;amp;T TV and U-verse video services under a single
    brand known as &quot;&lt;a data-ylk=&quot;elm:context_link;itc:0&quot; href=&quot;https://www.directv.com/stream/&quot;
