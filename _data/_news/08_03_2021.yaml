    in cash for the sale, which is but a tiny fraction of the $49 billion it originally
    paid when it purchased DirecTV in 2015. Back then, former AT&amp;amp;T CEO Randall
    Stephenson &lt;a data-ylk=&quot;elm:context_link;itc:0&quot; href=&quot;https://about.att.com/story/att_completes_acquisition_of_directv.html&quot;
    target=&quot;_blank&quot;&gt;said&lt;/a&gt; combining DirecTV with AT&amp;amp;T
    &quot;is all about giving customers more choices for great video entertainment
    integrated with mobile and high-speed internet service.&quot; According to &lt;a
    data-ylk=&quot;elm:context_link;itc:0&quot; href=&quot;https://www.latimes.com/entertainment-arts/business/story/2021-08-02/directv-spinoff-att&quot;
    target=&quot;_blank&quot;&gt;&lt;em&gt;Los Angeles Times&lt;/em&gt;&lt;/a&gt;,
    AT&amp;amp;T has lost 40 percent of the DirecTV&#x27;s original subscriber number
    since then, and in the second quarter of 2021, DirecTV reported having 15.4 million
    premium video subscribers.&lt;/p&gt;,\n &lt;p&gt;The telecom giant has been &lt;a
    data-ylk=&quot;elm:context_link;itc:0&quot; href=&quot;https://www.engadget.com/2019-09-18-att-may-split-with-directv-satellite-unit.html&quot;&gt;trying
