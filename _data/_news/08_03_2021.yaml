    \                   <td>article_text</td>\n                    <td class=\"code\"><pre>(&#x27;DirecTV
    is now its own company again after AT&amp;T closed the deal with private &#x27;\n
    &#x27;equity firm TPG, which it first announced back in February. Under their
    &#x27;\n &#x27;agreement, TPG would own 30 percent of the spinoff, while the mobile
    giant &#x27;\n &#x27;will retain a 70 percent ownership. As its own company, DirecTV
    will no &#x27;\n &#x27;longer operate under AT&amp;T and will own and run the
    AT&amp;T TV and U-verse video &#x27;\n &#x27;services under a single brand known
    as &quot;DirecTV Stream&quot; debuting later this &#x27;\n &quot;month. The new
    spinoff says customers won&#x27;t even feel the transition: The &quot;\n &quot;streaming
    services will continue being available and subscribers won&#x27;t be &quot;\n
    &#x27;blindsided by hidden fees.AT&amp;T received $7.1 billion in cash for the
    sale, &#x27;\n &#x27;which is but a tiny fraction of the $49 billion it originally
    paid when it &#x27;\n &#x27;purchased DirecTV in 2015. Back then, former AT&amp;T
    CEO Randall Stephenson &#x27;\n &#x27;said combining DirecTV with AT&amp;T &quot;is
    all about giving customers more choices &#x27;\n &#x27;for great video entertainment
    integrated with mobile and high-speed internet &#x27;\n &#x27;service.&quot; According
    to Los Angeles Times, AT&amp;T has lost 40 percent of the &#x27;\n &quot;DirecTV&#x27;s
    original subscriber number since then, and in the second quarter &quot;\n &#x27;of
    2021, DirecTV reported having 15.4 million premium video subscribers.The &#x27;\n
    &#x27;telecom giant has been trying to offload DirecTV since at least 2019, but
    it &#x27;\n &quot;hasn&#x27;t announced anything concrete until earlier this year.
    This deal &quot;\n &quot;doesn&#x27;t include the HBO Max streaming service, which
    will be part of the &quot;\n &quot;company&#x27;s separate WarnerMedia spinoff.
    In May, AT&amp;T announced a $43 billion &quot;\n &quot;deal that would see its
    WarnerMedia division merge with Discovery. It&#x27;s &quot;\n &#x27;expected to
    close in mid-2022, four years after AT&amp;T finalized its $85 &#x27;\n &#x27;billion
    acquisition of Time Warner. Both that deal and this DirecTV spinoff &#x27;\n &quot;will
    help AT&amp;T&#x27;s debt reduction efforts. As Deadline notes, it has taken &quot;\n
    &#x27;several steps, including selling off assets, over the past few years to
    &#x27;\n &#x27;reduce the debts it has acquired due to its massive multimedia
    &#x27;\n &#x27;acquisitions.Please enter a valid email address&#x27;)</pre></td>\n
