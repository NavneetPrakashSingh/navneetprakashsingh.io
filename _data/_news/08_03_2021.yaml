    a $43 billion deal that would see its WarnerMedia division merge with Discovery.
    It&#x27;s expected to close in mid-2022, four years after AT&amp;amp;T finalized
    its $85 billion acquisition of Time Warner. Both that deal and this DirecTV spinoff
    will help AT&amp;amp;T&#x27;s debt reduction efforts. As &lt;a data-ylk=&quot;elm:context_link;itc:0&quot;
