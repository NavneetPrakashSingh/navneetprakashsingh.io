  page_url: "/two-red-objects-asteroid-belt-115517310.html"
  summary: A group of scientists has discovered two unusually red objects in the asteroid
    belt between Jupiter and Mars, and they may have originated from farther in the
    solar system. Objects from the outer solar system such as the Kuiper belt, however,
    tend to be redder. As The New York Times points out, most objects in the inner
    solar system tend to reflect blue light, because they're devoid of or have very
    little organic materials. The event would've caused asteroids rich in organic
    materials to scatter and move around the solar system. Of course, more observations
    and evidence are needed to be able to prove that the two objects are from the
    Kuiper belt. The Nice model says our giant planets formed closer to the Sun until
    an instability forced Neptune, Uranus and Saturn to move outwards and Jupiter
    to move inwards. That's because they have a lot of organics like carbon and methane,
    which may have been the building blocks of our planet.
