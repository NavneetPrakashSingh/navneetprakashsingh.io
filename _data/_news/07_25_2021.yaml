  summary: That was enough to get smooth performance at the headset's full resolution,
    though I couldn't tell if I was always reaching 120fps to fill its refresh rate.
    And even though its aesthetic is relatively simple, the game's enemies, weapons
    and environments all looked more detailed than I remembered. Near-field speakers
    would have been a solid upgrade from on-ear headphones, especially since the Pro
    2's cans tended to make my head feel warm. It requires having two SteamVR base
    stations set up in opposite corners of your room, as well as USB 3.0 and DisplayPort
    cables running to a breakout box. If you've already got base stations from the
    original Vive Pro or Valve Index, they'll still work. It's still very comfortable,
    thanks to its plush cushioning along the front and back, as well as its balanced
    weight distribution. They work decently enough, but they're not nearly as ergonomic
