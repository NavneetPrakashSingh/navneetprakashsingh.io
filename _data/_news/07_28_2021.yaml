  page_url: "/rivian-reportedly-plans-to-invest-5-billion-in-a-second-us-assembly-plant-052245738.html"
  summary: The company plans to invest $5 billion initially in the second plant, dubbed
    Project Tera, with construction slated to start in the fall of 2021, according
    to Reuters. The second plant will reportedly include a 50 gigawatt-hour (GWh)
    battery cell production operation and a product and technology center. Last week,
    news leaked out that Rivian was planning to build a second US manufacturing plant
    for its electric vehicles and batteries, and now more details have leaked out.
    There's no word on where it'll be built, but the company is reportedly looking
    at land east of Mesa, Arizona, near Gold Canyon, according to Reuters' sources.
    The plant would supposedly support around 10,000 jobs, though many of those could
    come indirectly. For a startup that has so far not produced a single vehicle,
    however, the investment and job figures would be impressive. The aim is to begin
    production by the second quarter of 2023.
