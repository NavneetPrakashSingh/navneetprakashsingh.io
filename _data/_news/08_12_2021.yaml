  summary: 'What If?, premiering this week on the service, has a different problem:
    Its frantic and rushed, like a podcast episode played at 1.5x speed.The concept
    behind What If? )It runs from plot point to plot point, a highlight reel of the
    film with some small and a lot of big changes. Its a cel shaded style, which is
    more often used in video games and here looks a lot like rotoscoping. Its sort
    of stiff and awkward, with more attention paid to making characters look like
    their actors instead of being more fluid or expressive. The Disney+ era has given
    us shows with fewer episodes, but that hasnt deterred complaints about slow pacing.
    There isnt a lot of time for character development, because they assume you already
    know the characters well from seeing them on the silver screen. So its likely
    some episodes will be far more enjoyable than others based on their conceit alone,
