  summary: At the same time, if a reader converted to a paying member within 30 days
    of reading a writer's work, the writer would credit for that time. If a reader
    purchases a subscription via a writer's page, the writer will get half the fee
    for the entire life of the subscription  minus payment processing fees. Medium
    noted that subscriber referral earnings will be in addition to Partner Program
    earnings based on member read time. So, for every 100 members who sign up via
    a partner's referral landing page, that partner will make $201 per month. Presumably,
    however, there would be less money to go around from referred subscribers, since
    half their revenue would be going to the referring partner. At the same time,
