    \                   <td class=\"code\"><pre>[&lt;p&gt;Luke Skywalker&#x27;s CGI
    face in the character&#x27;s &lt;a data-ylk=&quot;elm:context_link;itc:0&quot;
    href=&quot;https://www.engadget.com/the-mandalorian-season-two-finale-disney-star-wars-154405456.html&quot;&gt;&lt;em&gt;The
    Mandalorian&lt;/em&gt;&lt;/a&gt; cameo was met with a lot of criticism, and fans
    even tried to fix the scene with various tools and programs. One of those fans
    did so well, Lucasfilm has &lt;a data-ylk=&quot;elm:context_link;itc:0&quot; href=&quot;https://www.cnet.com/news/lucasfilm-hires-deepfake-youtuber-who-fixed-the-mandalorian/#ftag=CAD590a51e&quot;
    target=&quot;_blank&quot;&gt;hired&lt;/a&gt; him to help it ensure its upcoming
    projects won&#x27;t feature underwhelming de-aging and facial visual effects.
    That fan is a YouTuber known as Shamook, who uses deepfake technology to improve
    upon bad CG effects and to put actors in shows and movies they never starred in.&lt;/p&gt;,\n
    &lt;p&gt;In the comments section of a video that replaces Christian Bale with
    Robert Pattinson as the Batman in Christopher Nolan&#x27;s film, Shamook &lt;a
    data-ylk=&quot;elm:context_link;itc:0&quot; href=&quot;https://www.youtube.com/watch?v=dmuYz0aZGgU&amp;amp;lc=UgwIZs7NpWc0EdjFK_x4AaABAg&quot;
    target=&quot;_blank&quot;&gt;wrote&lt;/a&gt; that he joined Lucasfilm/Industrial
    Light &amp;amp; Magic (ILM) a few months ago. When asked what his role within
    the company is, he said his official title is &quot;Senior Facial Capture Artist.&quot;
    The studio has confirmed the hire with &lt;a data-ylk=&quot;elm:context_link;itc:0&quot;
    href=&quot;https://www.indiewire.com/2021/07/lucasfilm-hires-deepfake-youtuber-mandalorian-skywalker-vfx-1234653720/&quot;
    target=&quot;_blank&quot;&gt;&lt;em&gt;IndieWire&lt;/em&gt;&lt;/a&gt;, telling
    the publication that it&#x27;s always on the lookout for talented artists. A representative
    said in a statement:&lt;/p&gt;,\n &lt;p&gt;&quot;Over the past several years ILM
    has been investing in both machine learning and A.I. as a means to produce compelling
    visual effects work and its been terrific to see momentum building in this space
    as the technology advances.&quot;&lt;/p&gt;,\n &lt;p&gt;In addition to working
    on a deepfake version of Luke in &lt;em&gt;The Mandalorian&lt;/em&gt;, he also
    &lt;a data-ylk=&quot;elm:context_link;itc:0&quot; href=&quot;https://www.youtube.com/watch?v=_CXMb_MO3aw&quot;
    target=&quot;_blank&quot;&gt;deepfaked&lt;/a&gt; Tarkin&#x27;s and Leia&#x27;s
    appearances in &lt;em&gt;Rogue One&lt;/em&gt;. Shamook&#x27;s videos don&#x27;t
    always show the most realistic results, but the great ones like Luke&#x27;s truly
    look impressive. Lucasfilm could his technical know-how to make sure de-aged characters
    and CG faces won&#x27;t take us straight to uncanny valley anymore.&lt;/p&gt;,\n
