    researchers used a helmet that generates a magn… [+1516 chars]
  page_url: "/magnetic-helmet-tumor-093523598.html"
  summary: The resulting magnetic field therapy created by the helmet was administered
    for two hours initially and then ramped up to a maximum of six hours per day.
    As part of the latest neurological breakthrough, researchers used a helmet that
    generates a magnetic field to shrink a deadly tumor by a third. As part of the
    therapy, the patient wore the device for five weeks at a clinic and then at home
    with the help of his wife. But, an autopsy of his brain showed that the procedure
    had removed 31 percent of the tumor mass in a short time. We've seen helmets and
    AI that can spot brain tumors, but a new hard hat can actually treat them, too.
    The 53-year-old patient who underwent the treatment ultimately passed away due
    to an unrelated injury. Details of the procedure have been published in the peer-reviewed
    journal Frontiers in Oncology.Please enter a valid email address
