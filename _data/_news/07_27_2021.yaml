  publishedAt: '2021-07-26T18:22:22.8911638Z'
  content: After returning from the edge of space, Jeff Bezos has personally waded
    into Blue Origin's dispute with NASA over its decision to award a $2.9 billion
    lunar lander contract to Elon Musk's SpaceX. In … [+2374 chars]
  page_url: "/jeff-bezos-nasa-open-letter-181522642.html"
  summary: '"Instead of investing in two competing lunar landers as originally intended,
    the Agency chose to confer a multi-year, multi-billion-dollar head start to SpaceX,"
    the former Amazon CEO said. Notably, this isn''t the first time a Bezos-affiliated
    company has got itself into a contract dispute with the US government. "That decision
    broke the mold of NASA''s successful commercial space programs by putting an end
    to meaningful competition for years to come. "While Bezos spends a significant
    part of his letter talking about Blue Origin''s commitment to "advance America''s
    future in space," his offer isn''t altruistic. "This offer is not a deferral,
    but is an outright and permanent waiver of those payments," Bezos said in the
    letter. In 2019, Amazon challenged the Department of Defense''s decision to award
    Microsoft its $10 billion Joint Enterprise Defense Infrastructure (JEDI) cloud
    contract. At the heart of it is the belief that NASA unfairly excluded his company
    from a lucrative and prestigious contract.'
