    class=\"code\"><pre>(&quot;Luke Skywalker&#x27;s CGI face in the character&#x27;s
    The Mandalorian cameo was met &quot;\n &#x27;with a lot of criticism, and fans
    even tried to fix the scene with various &#x27;\n &#x27;tools and programs. One
    of those fans did so well, Lucasfilm has hired him &#x27;\n &quot;to help it ensure
    its upcoming projects won&#x27;t feature underwhelming de-aging &quot;\n &#x27;and
    facial visual effects. That fan is a YouTuber known as Shamook, who uses &#x27;\n
    &#x27;deepfake technology to improve upon bad CG effects and to put actors in
    &#x27;\n &#x27;shows and movies they never starred in. In the comments section
    of a video &#x27;\n &#x27;that replaces Christian Bale with Robert Pattinson as
    the Batman in &#x27;\n &quot;Christopher Nolan&#x27;s film, Shamook wrote that
    he joined Lucasfilm/Industrial &quot;\n &#x27;Light &amp; Magic (ILM) a few months
    ago. When asked what his role within the &#x27;\n &#x27;company is, he said his
    official title is &quot;Senior Facial Capture Artist.&quot; &#x27;\n &#x27;The
    studio has confirmed the hire with IndieWire, telling the publication &#x27;\n
    &quot;that it&#x27;s always on the lookout for talented artists. A representative
    said &quot;\n &#x27;in a statement:&quot;Over the past several years ILM has been
    investing in both &#x27;\n &#x27;machine learning and A.I. as a means to produce
    compelling visual effects &#x27;\n &#x27;work and its been terrific to see momentum
    building in this space as the &#x27;\n &#x27;technology advances.&quot;In addition
    to working on a deepfake version of Luke in &#x27;\n &quot;The Mandalorian, he
    also deepfaked Tarkin&#x27;s and Leia&#x27;s appearances in Rogue &quot;\n &quot;One.
    Shamook&#x27;s videos don&#x27;t always show the most realistic results, but the
    &quot;\n &quot;great ones like Luke&#x27;s truly look impressive. Lucasfilm could
    his technical &quot;\n &quot;know-how to make sure de-aged characters and CG faces
    won&#x27;t take us straight &quot;\n &#x27;to uncanny valley anymore. Please enter
    a valid email address&#x27;)</pre></td>\n                  </tr>\n                \n
