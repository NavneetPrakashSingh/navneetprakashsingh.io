    \                   <td class=\"code\"><pre>[&lt;p&gt;Dish Network is finally
    offering HBO, Cinemax and HBO Max to its subscribers after &lt;a data-ylk=&quot;elm:context_link;itc:0&quot;
    href=&quot;https://www.engadget.com/2018-11-01-hbo-dish-att.html&quot;&gt;kicking
    HBO off its network&lt;/a&gt; nearly three years ago. It&#x27;s the first time
    Dish subscribers will be able to watch HBO shows like &lt;em&gt;Mare of Easttown&lt;/em&gt;
    and &lt;em&gt;Euphoria&lt;/em&gt; since the carriage dispute began on October
    31st, 2018. However, the new agreement doesn&#x27;t cover Dish subsidiary Sling
    TV&#x27;s distribution of HBO or HBO Max.&lt;/p&gt;,\n &lt;p&gt;When Dish removed
    HBO and Cinemax channels, it accused then-parent  AT&amp;amp;T of using HBO as
    an &quot;economic weapon.&quot; At that time, HBO was only a straight cable station,
    but &lt;a data-ylk=&quot;elm:context_link;itc:0&quot; href=&quot;https://www.engadget.com/2019-07-09-hbo-max.html&quot;&gt;AT&amp;amp;T
    launched HBO Max&lt;/a&gt; as a Netflix-like streaming service in July of 2019.
    With the situation now resolved, Dish becomes the last major pay TV distributor
    to add HBO Max to its lineup.&lt;/p&gt;,\n &lt;p&gt;The resolution follows a major
    shakeup with HBO&#x27;s parent, WarnerMedia. In May 2021, AT&amp;amp;T &lt;a data-ylk=&quot;elm:context_link;itc:0&quot;
    href=&quot;https://about.att.com/story/2021/warnermedia_discovery.html&quot; target=&quot;_blank&quot;&gt;announced&lt;/a&gt;
    that it was spinning off that division and merging it with Discovery in a $43
    billion deal. That effectively removed a conflict of interest as AT&amp;amp;T
    is a direct competitor to Dish in the satellite video service provider space.
    The parties haven&#x27;t disclosed the terms of the new agreement.&lt;/p&gt;,\n
    &lt;p&gt;With an accord now in pace, Dish customers get a free 10-day free of
    HBO and Cinemax from Aug. 6-15. Dish users can subscribe to the HBO Max ad-free
    plan for $12 rather than the regular price of $15 per month for up to 12 months
    if they act before Oct. 27, 2021. They&#x27;ll get HBO Max access on supported
    devices like iOS, Android, Roku, Apple TV and Fire TV, along with live channels
    including HBO, HBO Family and HBO Signature. Dish TV customers can also get Cinemax
    for $10 per month.&lt;/p&gt;,\n &lt;p&gt;&lt;/p&gt;,\n &lt;p class=&quot;Pos(a)
    M(0) T(60px) Start(6px) D(n) C(errorColor)&quot; role=&quot;alert&quot;&gt;Please
