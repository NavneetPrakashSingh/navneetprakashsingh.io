  summary: AMD also touts custom features like Radeon Boost for higher frame rates
    and Radeon Anti-Lag for improved latency.The main new feature with the 6000-series
    GPUs, however, is ray-tracing. That feature allows for higher resolutions (1440p
    and 4K) while still maintaining decent frame rates and allowing for more realistic
    images. AMD noted that around two-third of monitors shipped are still 1080p, so
    that's still the norm for PC gaming. Still, it looks pretty impressive otherwise
    for a budget-level 1080p card. We'll soon see a raft of RX 6600 XT models from
