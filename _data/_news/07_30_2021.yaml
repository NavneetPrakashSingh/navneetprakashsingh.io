  content: Amazon's first-gen Echo Show 5 dropped down to $45 from its original price
    of $80 ahead of Prime Day back in June. If you missed the chance to get the Alexa-powered
    smart display at a discount, thoug… [+1736 chars]
  page_url: "/amazon-first-gen-echo-show-5-lowest-price-best-buy-044542257.html"
  summary: 'If you missed the chance to get the Alexa-powered smart display at a discount,
    though, now''s your chance to get one: It''s available for $45 again on Best Buy.
    If you find its screen too small for serious bingeing, though, you can also use
    it as an alarm clock with several clock faces to choose from. It even comes with
    a sunrise feature, which slowly brightens the screen fifteen minutes prior to
    your alarm time to mimic the effects of daylight''s arrival. Its 5.5-inch screen
    has the same 960 x 480 resolution as its newer counterpart, it has a fabric-wrapped
    speaker and it has several clock faces to choose from. However, it still has a
    much lower resolution than the Echo Show 8, and it doesn''t support a lot of the
    bigger smart display''s capabilities. The second-gen Echo Show 5 has a 2-megapixel
    camera instead of a one-megapixel, and it comes in a light blue color in addition
    to black and white. The device supports Amazon Prime, NBC and Hulu, so you can
    use it to watch shows, as well as to display images and videos.'
