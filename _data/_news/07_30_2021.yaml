    \                 <tr>\n                    <td>article_text</td>\n                    <td
    class=\"code\"><pre>(&#x27;Dish Network is finally offering HBO, Cinemax and HBO
    Max to its subscribers &#x27;\n &quot;after kicking HBO off its network nearly
    three years ago. It&#x27;s the first &quot;\n &#x27;time Dish subscribers will
    be able to watch HBO shows like Mare of Easttown &#x27;\n &#x27;and Euphoria since
    the carriage dispute began on October 31st, 2018. &#x27;\n &quot;However, the
    new agreement doesn&#x27;t cover Dish subsidiary Sling TV&#x27;s &quot;\n &#x27;distribution
    of HBO or HBO Max. When Dish removed HBO and Cinemax channels, &#x27;\n &#x27;it
    accused then-parent AT&amp;T of using HBO as an &quot;economic weapon.&quot; At
    that &#x27;\n &#x27;time, HBO was only a straight cable station, but AT&amp;T
    launched HBO Max as a &#x27;\n &#x27;Netflix-like streaming service in July of
    2019. With the situation now &#x27;\n &#x27;resolved, Dish becomes the last major
    pay TV distributor to add HBO Max to &#x27;\n &quot;its lineup. The resolution
    follows a major shakeup with HBO&#x27;s parent, &quot;\n &#x27;WarnerMedia. In
    May 2021, AT&amp;T announced that it was spinning off that &#x27;\n &#x27;division
    and merging it with Discovery in a $43 billion deal. That &#x27;\n &#x27;effectively
    removed a conflict of interest as AT&amp;T is a direct competitor to &#x27;\n
    &quot;Dish in the satellite video service provider space. The parties haven&#x27;t
    &quot;\n &#x27;disclosed the terms of the new agreement. With an accord now in
    pace, Dish &#x27;\n &#x27;customers get a free 10-day free of HBO and Cinemax
    from Aug. 6-15. Dish &#x27;\n &#x27;users can subscribe to the HBO Max ad-free
    plan for $12 rather than the &#x27;\n &#x27;regular price of $15 per month for
    up to 12 months if they act before Oct. &#x27;\n &quot;27, 2021. They&#x27;ll
    get HBO Max access on supported devices like iOS, Android, &quot;\n &#x27;Roku,
    Apple TV and Fire TV, along with live channels including HBO, HBO &#x27;\n &#x27;Family
    and HBO Signature. Dish TV customers can also get Cinemax for $10 per &#x27;\n
    &#x27;month.Please enter a valid email address&#x27;)</pre></td>\n                  </tr>\n
