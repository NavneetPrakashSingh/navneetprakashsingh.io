  publishedAt: '2021-07-29T13:07:19.0712688Z'
  content: Who is a powerful miniature desktop for? That was the question running
    through my mind when I reviewed Intel's NUC 9 Extreme last year. It was the company's
    most powerful compact PC kit (NUC stands f… [+5463 chars]
  page_url: "/intel-nuc-11-extreme-review-practical-tiny-gaming-desktop-pc-130041721.html"
  summary: I couldn't fathom why anyone would pay out the nose for a compromised desktop
    that couldn't fit a full-sized GPU. Given the small workable space, I was also
    interested in seeing how more powerful GPUs would fit into the NUC 11. Its black
    metal case sports mesh air vents along the sides, giving you a peek at the GPU
    within and three large case fans up top. But I couldn't review a gaming PC without
    actually playing some games, could I? I was even able to get Control running in
    1440p between 60 and 70 fps with medium ray tracing settings and graphics set
    to high. )This being the ultimate DIY PC kit, I also had to tear it open to see
    just how modular it actually was. Hit the power button and it springs to life
    with an LED skull along the front panel, as well as underside LED lighting.
