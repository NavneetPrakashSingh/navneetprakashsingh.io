  url: https://www.engadget.com/cyber-ark-microsoft-windows-hello-trick-173547832.html
  urlToImage: https://s.yimg.com/os/creatr-uploaded-images/2021-07/3b59a8c0-e700-11eb-b77f-1f418c6d7ef6
  publishedAt: '2021-07-17T17:52:18.3633834Z'
  content: Microsoft designed Windows Hello to be compatible with webcams across multiple
    brands, but that feature designed for ease of adoption could also make the technology
    vulnerable to bad actors. As repor… [+1638 chars]
  page_url: "/cyber-ark-microsoft-windows-hello-trick-173547832.html"
  summary: Windows Hello requires the use of cameras with both RGB and infrared sensors,
    but upon investigating the authentication system, the researchers found that it
    only processes infrared frames. As reported by Wired, researchers from the security
    firm CyberArk managed to fool the Hello facial recognition system using images
    of the computer owner's face. To verify their finding, the researchers created
    a custom USB device, which they loaded with infrared photos of the user and RGB
    images of Spongebob. Moreover, the researchers found that they didn't even need
    multiple IR images  a single IR frame with one black frame can unlock a Hello-protected
    PC. Breaking into someone's computer using the technique would be terribly hard
    to pull off in reality, seeing as the attacker still needs an IR photo of the
    user. Microsoft designed Windows Hello to be compatible with webcams across multiple
    brands, but that feature designed for ease of adoption could also make the technology
    vulnerable to bad actors. That said, it's still a weakness that could be exploited
    by those especially motivated to infiltrate someone's computer.
