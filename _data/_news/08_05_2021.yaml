  page_url: "/intel-laid-out-an-aggressive-plan-to-build-angstrom-scale-transistors-within-the-next-five-years-180020485.html"
  summary: Beyond that, Intel has technology mapped out for an EUV-based 3nm node
    that will use the high-energy manufacturing process to streamline chip creation,
    and a "20A" for angstrom node. For even more info on Intel's plans, and details
    on its EMIB interconnect technology and two new versions of Foveros, be sure to
    check out the video above. This may feel a little duplicitous  "just wave a wand
    a you've got better technology!" Earlier this year, Intel announced they were
