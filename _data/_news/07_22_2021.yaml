  page_url: "/twitter-testing-downvote-button-ios-033201874.html"
  summary: 'Some Twitter users on iOS might see a new button that looks like Reddit''s
    downvote button in people''s replies. Some may see upvote and downvote buttons,
    while others might only see a downvote button right next to Twitter''s heart/like
    option. That''s part of the social network''s latest experimental feature designed
    to give it more insight on what kind of replies users find relevant in a conversation.
    He added: "Were hoping to learn more about the quality of replies that people
    vote on and if voting is a feature that people find valuable. Votes wont change
    the order of replies.At the moment, votes won''t change the order of responses
    similar to how Reddit buries replies that get a ton of downvotes. "In past research,
    weve learned which types of replies are considered best when reading conversations:InformativeSupportivePositiveFunnyThis
