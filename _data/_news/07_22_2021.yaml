    After playing though the preview of Al… [+2073 chars]
  page_url: "/aliens-fireteam-elite-preview-video-140044958.html"
  summary: 'Fireteam Elite feels like an online, updated version of light-gun games
    like Area 51 or House of the Dead, complete with repetitive environments and sloppy
    hit boxes. After playing though the preview of Aliens: Fireteam Elite, I can say
    it feels like the developers really took this line to heart. Instead, Aliens:
    Fireteam Elite feels like a theme park ride in video game form. The swarms rarely
    feel unmanageable and the specialized xenomorphs, like spitters or jumpers, routinely
    behave in non-threatening ways. Plus, I have to note that my game crashed three
    times in about seven hours of play.Thats not to say the AI is trash altogether.
    Cold Iron was actually bought and sold four times starting in 2018, bringing its
    mysterious Alien-based game along for the ride. Each campaign consists of three
    missions filled with AI-powered Xenomorph hordes, with three difficulty levels
    unlocked from the start.'
