  page_url: "/best-gaming-laptops-for-students-170026726.html"
  summary: 'While you can find decent GPUs on some productivity laptops, like Dell''s
    XPS 15, you can sometimes find better deals on gaming laptops. In this piece,
    you''ll find a few selections specifically geared towards school use.As stated
    above, gaming laptops are especially helpful if you''re doing any demanding work.
    Today''s gaming notebooks are still far lighter than older models, though, so
    at least you won''t be lugging around a 10-pound brick. You can find some general
    advice on choosing gaming laptops in our guide. My general advice for any new
    workhorse machine: Get at least 16GB of RAM and the largest solid state drive
    you can find. They''re particularly useful for students because their beefy hardware
    could be helpful for rendering video and doing any other schoolwork that would
    make super-thin ultraportables sweat. Those components are both typically hard
    to upgrade down the line.The one big downside to choosing a gaming notebook is
